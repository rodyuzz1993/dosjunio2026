
<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gracias por contactarnos | Recuperación Express</title>

    <meta 
        name="description" 
        content="Gracias por enviar tu información a Recuperación Express. Un asesor revisará tu caso y se pondrá en contacto contigo por WhatsApp a la brevedad."
    >

    <meta name="robots" content="noindex, follow">

    <meta name="author" content="Recuperación Express">
    <meta name="copyright" content="Recuperación Express">

    <link rel="canonical" href="https://dosjunio2026.netlify.app/gracias">

    <link rel="icon" href="/public/favicon.ico" sizes="any">
    <link rel="icon" href="/public/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/public/apple-touch-icon.png">

    <meta name="theme-color" content="#0A6B3F">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Gracias por contactarnos | Recuperación Express">
    <meta 
        property="og:description" 
        content="Recibimos tu información correctamente. Un asesor de Recuperación Express revisará tu caso y te contactará por WhatsApp."
    >
    <meta property="og:url" content="https://dosjunio2026.netlify.app/gracias">
    <meta property="og:site_name" content="Recuperación Express">
    <meta property="og:image" content="https://dosjunio2026.netlify.app/og-image.webp">
    <meta property="og:image:alt" content="Recuperación Express">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Gracias por contactarnos | Recuperación Express">
    <meta 
        name="twitter:description" 
        content="Gracias, recibimos tu información. Un asesor revisará tu caso y te contactará por WhatsApp."
    >
    <meta name="twitter:image" content="https://dosjunio2026.netlify.app/og-image.webp">

    <link rel="stylesheet" href="/public/styles/styles.css">
</head>

<body>

    <header class="site-header BGMarino">
        <a href="/" title="Regresar a inicio" aria-label="Regresar a inicio">
            <img
                src="/public/media/RECUPERACIÓN-EXPRESS.webp?width=500"
                alt="Recuperación Express - Asesoría rápida y segura"
                title="Regresar a inicio"
                width="220"
                height="57"
                decoding="async"
            >
        </a>
    </header>

    <main>
        <section id="hero" class="reveal reveal-up reveal-delay-1 show">
            
            <aside class="textos">
                <h1 class="reveal reveal-up reveal-delay-2 show">
                    <span>GRACIAS POR CONTACTARNOS</span>
                    <br>
                    <span class="CVerde">ALGUIEN SE PONDRÁ EN CONTACTO CONTIGO</span>
                </h1>
            </aside>

            <aside id="imagenes" aria-label="Elementos visuales de seguridad financiera">
                <img 
                    class="circulo reveal reveal-down reveal-delay-1 show" 
                    src="/public/media/Dinero.webp?width=120" 
                    alt="Dinero" 
                    width="100" 
                    height="100" 
                    decoding="async" 
                    loading="eager"
                >

                <img 
                    class="circulo reveal reveal-down reveal-delay-2 show" 
                    src="/public/media/Banco.webp?width=120" 
                    alt="Banco" 
                    width="100" 
                    height="100" 
                    decoding="async" 
                    loading="eager"
                >

                <img 
                    class="principal reveal reveal-down reveal-delay-1 show" 
                    src="/public/media/Protección-escudo.webp?width=1000" 
                    alt="Escudo de protección y seguridad" 
                    width="600" 
                    height="600" 
                    decoding="async" 
                    fetchpriority="high"
                >

                <img 
                    class="circulo reveal reveal-down reveal-delay-2 show" 
                    src="/public/media/Tarjeta-de-credito.webp?width=120" 
                    alt="Tarjeta de crédito" 
                    width="100" 
                    height="100" 
                    decoding="async" 
                    loading="eager"
                >

                <img 
                    class="circulo reveal reveal-down reveal-delay-1 show" 
                    src="/public/media/Cuenta.webp?width=120" 
                    alt="Cuenta bancaria" 
                    width="100" 
                    height="100" 
                    decoding="async" 
                    loading="eager"
                >
            </aside>

            <article class="BGGrisClaro reveal reveal-up reveal-delay-3 show">
                <a href="/" class="BGVerde CBlanco btn">
                    Regresar a la página principal
                </a>
            </article>

        </section>
    </main>

    <footer class="site-footer BGMarino">
        <div class="footer-politicas">
            <button 
                type="button" 
                class="footer-policy-link CBlanco" 
                data-policy="privacidad"
            >
                Aviso de privacidad
            </button>

            <button 
                type="button" 
                class="footer-policy-link CBlanco" 
                data-policy="terminos"
            >
                Términos y condiciones
            </button>
        </div>

        <div class="footer-copy">
            <p class="CBlanco">© <span id="currentYear"></span> Recuperación Express. Todos los derechos reservados.</p>
        </div>
    </footer>

    <div class="policy-modal" id="policyModal" aria-hidden="true">
        <div class="policy-modal__overlay" data-close-modal></div>

        <article 
            class="policy-modal__content" 
            role="dialog" 
            aria-modal="true" 
            aria-labelledby="policyModalTitle"
        >
            <button 
                type="button" 
                class="policy-modal__close" 
                aria-label="Cerrar política"
                data-close-modal
            >
                ×
            </button>

            <h2 id="policyModalTitle">Título de política</h2>

            <div class="policy-modal__body" id="policyModalBody">
                <!-- Aquí se inserta el contenido con JS -->
            </div>
        </article>
    </div>
    <script src="/public/scripts/global.js"></script>
    <script src="/public/scripts/animacion-p.js" defer></script>
</body>
</html>
